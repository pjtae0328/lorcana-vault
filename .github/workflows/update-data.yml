name: Update Lorcana Data

on:
  # 매주 월요일 오전 9시 (KST) = 일요일 24시 UTC
  schedule:
    - cron: '0 0 * * 1'
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data from Lorcast API
        run: node scripts/fetch-data.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: update card data from Lorcast API [$(date +%Y-%m-%d)]"
          git push
